<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lecture d'un article du blog.">
  <title>Blog — Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <a href="#main-content" class="skip-link">Aller au contenu</a>

  <!-- ===== EN-TÊTE ===== -->
  <header class="site-header">
    <div class="container">
      <span class="site-title"><a href="index.html">Blog</a></span>
      <nav class="site-nav" aria-label="Navigation principale">
        <a href="index.html">Accueil</a>
        <a href="articles.html">Articles</a>
        <a href="a-propos.html">À propos</a>
      </nav>
    </div>
  </header>

  <main class="container" id="main-content" aria-busy="true">

    <!-- Image hero de l'article -->
    <div class="article-hero" id="article-hero"></div>

    <!-- En-tête de l'article : titre + méta -->
    <header class="article-header" id="article-header"></header>

    <!-- Contenu de l'article (généré dynamiquement) -->
    <article class="article-content" id="article-content" aria-live="polite">
      <p class="loading-indicator">Chargement de l'article…</p>
    </article>

  </main>

  <!-- ===== PIED DE PAGE ===== -->
  <footer class="site-footer">
    <div class="container footer-content">
      <svg class="footer-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      <p>&copy; 2026 Blog. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/article.js"></script>

</body>
</html>
