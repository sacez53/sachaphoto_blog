<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Un blog simple et minimaliste. Articles sur le web, le code et la simplicité.">
  <title>Blog — Accueil</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <!-- Police Inter depuis Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Lien d'évitement pour la navigation au clavier -->
  <a href="#main-content" class="skip-link">Aller au contenu</a>

  <!-- ===== EN-TÊTE ===== -->
  <!-- Modifier le nom du blog et les liens de navigation ici -->
  <header class="site-header"></header>

  <main class="container" id="main-content">

    <!-- ===== ARTICLES MIS EN AVANT ===== -->
    <section aria-labelledby="featured-heading">
      <h2 class="section-title" id="featured-heading">À la une</h2>
      <ul class="featured-list" id="featured-list" role="list" aria-busy="true">
        <li class="loading-indicator" aria-hidden="true">Chargement…</li>
      </ul>
    </section>

    <!-- ===== ARTICLES RÉCENTS ===== -->
    <section aria-labelledby="recent-heading">
      <h2 class="section-title" id="recent-heading">Articles récents</h2>
      <ul class="articles-grid articles-grid--three" id="recent-list" role="list" aria-busy="true">
        <li class="loading-indicator" aria-hidden="true">Chargement…</li>
      </ul>
      <p class="see-more">
        <a href="articles.html">
          Voir tous les articles
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </a>
      </p>
    </section>

  </main>

  <!-- ===== PIED DE PAGE ===== -->
  <!-- Modifier le texte du footer ici -->
  <footer class="site-footer"></footer>

  <!-- Scripts : main.js (utilitaires) puis index.js (logique de la page) -->
  <script src="assets/js/main.js"></script>
  <script src="assets/js/index.js"></script>

</body>
</html>
